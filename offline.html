<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline — Bradethy</title>
    <link rel="stylesheet" href="/css/base.css">
    <style>
      body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f7f7f7; color:#222 }
      .card{ max-width:520px; padding:28px; background:white; border-radius:10px; box-shadow:0 6px 24px rgba(0,0,0,0.08); text-align:center }
      a.button{ display:inline-block; margin-top:16px; padding:10px 16px; background:#0078d4; color:white; border-radius:6px; text-decoration:none }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>It looks like you're not connected to the internet. Some features may be unavailable, but you can still browse cached pages.</p>
      <a class="button" href="/">Go to homepage</a>
    </div>
  </body>
</html>
