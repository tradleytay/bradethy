<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogue Quote | Hotel Essentials</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <style>
    body { background: #fff; }

    .quote-wrap{
      max-width:1100px;
      margin:2rem auto;
      padding:0 1rem;
      font-family: inherit;
    }

    .quote-card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    .quote-head{
      display:flex;
      flex-wrap:wrap;
      gap:1rem;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:1.25rem;
    }

    .quote-title{font-size:1.8rem;font-weight:800; color: var(--dark, #0b1220);}
    .quote-meta{color:var(--gray);line-height:1.6; font-size:0.95rem;}

    .quote-actions{
      display:flex;
      gap:0.75rem;
      justify-content:flex-end;
      flex-wrap:wrap;
      margin:0.25rem 0 0;
    }

    .quote-table{width:100%;border-collapse:collapse;}
    .quote-table th,.quote-table td{
      border:1px solid #e5e7eb;
      padding:0.6rem 0.5rem;
      text-align:left;
      font-size:0.95rem;
    }
    .quote-table th{background:#f8fafc;}

    .quote-total{margin-top:1.25rem;display:flex;justify-content:flex-end;}
    .quote-total .box{
      border:1px solid #e5e7eb;
      padding:0.9rem 1rem;
      border-radius:12px;
      min-width:280px;
    }

    .quote-total .box strong{color:var(--primary)}

    @media print{
      .quote-actions{display:none;}
      body{margin:0;}
      .quote-wrap{margin:0;max-width:none;padding:0;}
      .quote-card{border:none;box-shadow:none;border-radius:0;}
    }
  </style>
</head>
<body>
  <div class="quote-wrap">
    <div class="quote-card">
<div class="quote-head" aria-label="Catalogue quotation header">
        <div>
          <div class="quote-title" id="quoteTitle">Quote</div>
          <div class="quote-meta" id="quoteMeta">&nbsp;</div>
        </div>

        <div class="quote-actions">
          <button class="btn" type="button" id="downloadPdfBtn">Download PDF</button>
          <button class="btn btn-ghost" type="button" onclick="window.close && window.close()">Close</button>
        </div>
      </div>

      <table class="quote-table" id="quoteTable">
        <thead>
          <tr>
            <th style="width:60%">Item</th>
            <th style="width:10%">Qty</th>
            <th style="width:15%">Unit Price</th>
            <th style="width:15%">Line Total</th>
          </tr>
        </thead>
        <tbody id="quoteTbody"></tbody>
      </table>

      <div class="quote-total">
        <div class="box">
          <div style="display:flex;justify-content:space-between;gap:1rem;align-items:center;">
            <span style="color:var(--gray)">Total</span>
            <strong id="quoteTotalText">$0.00</strong>
          </div>
          <div style="color:var(--gray);font-size:0.9rem;margin-top:0.5rem;">
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.25rem;">
              <img src="images/icon-192.png" alt="Hotel Essentials logo" style="width:40px;height:40px;object-fit:contain;" />
              <div style="font-weight:800;color:var(--dark);">Hotel Essentials</div>
            </div>
            <div>11325 Hatcliffe, Harare, Zimbabwe</div>
            <div>info@hotelessentials.com</div>
            <div>+(263) 772-814-702</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/quote.js"></script>
</body>
</html>
